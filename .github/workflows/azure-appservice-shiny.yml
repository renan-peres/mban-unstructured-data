name: Build and Deploy Shiny Container to Azure

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_DIR: "#A1 - AirBnb Text Mining & NLP"
  IMAGE_NAME: airbnb-shiny

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push container image
        id: build_image
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_URI="${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_URI_LATEST="${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:latest"

          docker build \
            -f "${APP_DIR}/Dockerfile" \
            -t "${IMAGE_URI}" \
            -t "${IMAGE_URI_LATEST}" \
            "${APP_DIR}"

          docker push "${IMAGE_URI}"
          docker push "${IMAGE_URI_LATEST}"

          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Ensure Web App container port setting
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --settings WEBSITES_PORT=3838

      - name: Deploy image to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ steps.build_image.outputs.image_uri }}
