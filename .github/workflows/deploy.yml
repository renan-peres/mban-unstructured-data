name: Build & Deploy Shinylive

on:
  push:
    branches: [main]

env:
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libarchive-dev libcurl4-openssl-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ hashFiles('apps/airbnb-shinylive/scripts/prepare_shinylive_data.R', 'apps/airbnb-shinylive/scripts/export_shinylive.R') }}
          restore-keys: r-pkgs-

      - name: Install R packages
        shell: Rscript {0}
        run: |
          pkgs <- c(
            "arrow", "dplyr", "tidyr", "tidytext", "textdata",
            "rappdirs", "shinylive",
            "shiny", "ggplot2", "DT", "plotly", "scales", "leaflet", "htmltools"
          )
          missing <- pkgs[!sapply(pkgs, requireNamespace, quietly = TRUE)]
          if (length(missing) > 0) {
            install.packages(missing, repos = "https://packagemanager.posit.co/cran/latest")
          }

      - name: Prepare Shinylive data (precompute RDS assets)
        shell: Rscript {0}
        run: |
          setwd("apps/airbnb-shinylive/scripts")
          source("prepare_shinylive_data.R")

      - name: Export Shinylive static site
        shell: Rscript {0}
        run: |
          setwd("apps/airbnb-shinylive/scripts")
          source("export_shinylive.R")

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=site

